services:
  backend:
    build:
      context: ./backend
      args:
        HF_TOKEN: ${HF_TOKEN}
    environment:
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - transcriptor-data:/app/data
    restart: unless-stopped
    # Tesla T4 GPU — 16GB VRAM
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 14G

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ""
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  transcriptor-data:
