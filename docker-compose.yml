version: "3.8"

services:
  backend:
    build:
      context: ./backend
      args:
        HF_TOKEN: ${HF_TOKEN}  # Передаётся из .env файла
    environment:
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - transcriptor-data:/app/data
    restart: unless-stopped
    # Раскомментируйте для GPU (NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ""
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  transcriptor-data:
